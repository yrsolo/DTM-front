    title: "Web"
    description: "Лендинги, страницы, кнопки и обложки для сайта."
    sort_order: 160

aliases:
  grafrolik:
    priority: 100
    exact:
      - "графролик"
      - "граф ролик"
      - "графическая заставка"
      - "граф заставка"
    contains_all:
      - ["граф", "ролик"]
      - ["граф", "заставк"]
  logo_integration:
    priority: 100
    exact:
      - "интеграция в лого"
      - "интеграция логотип"
