  screen_branding:
    priority: 100
    exact:
      - "брендинг экранов"
      - "брендинг экрана"
      - "экраны брендинг"
    contains_all:
      - ["брендинг", "экран"]
  dynamic_logo:
    priority: 120
    exact:
      - "дин лого"
      - "динлого"
      - "динам лого"
