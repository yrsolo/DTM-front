      - "сайт"
      - "лендинг"
      - "страниц"
  screencast:
    priority: 100
    exact:
      - "скринкаст"
      - "screen cast"
      - "screencast"
    contains_all:
      - ["скрин"]
      - ["screen", "cast"]
  video_adaptation:
    priority: 90
    exact:
      - "адаптация ролика"
      - "адаптация"
      - "ресайз ролика"
    contains_all:
      - ["адаптац", "ролик"]
