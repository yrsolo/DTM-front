# Source of truth for task format normalization.
# 1. Edit titles and descriptions in `formats`.
# 2. Maintain reusable auto-match rules in `aliases`.
# 3. Keep one-off raw mappings in `manual_overrides`.
# Multi-line raw values stay in one quoted string and use `\n` escapes.

formats:
  grafrolik:
    title: "Графролик"
    description: "Графическая заставка и близкие форматы."
    sort_order: 10
  logo_integration:
    title: "Интеграция в лого"
    description: "Интеграции и встройка в логотип."
    sort_order: 20
  shorts:
