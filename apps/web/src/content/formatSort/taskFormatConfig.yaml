      - ["динам", "лого"]
      - ["динамич", "логотип"]
  electronic_logo:
    priority: 120
    exact:
      - "эл лого"
      - "эл.лого"
      - "эллого"
      - "эл логотип"
      - "электронный логотип"
    contains_all:
