    description: "Скринкасты и screen capture форматы."
    sort_order: 100
  video_adaptation:
    title: "Адаптация ролика"
    description: "Адаптации и ресайзы роликов."
    sort_order: 110
  screen_branding:
    title: "Брендинг экранов"
    description: "Брендинг экранов и экранные пакеты."
    sort_order: 120
  dynamic_logo:
    title: "Дин лого"
    description: "Динамический логотип."
    sort_order: 130
  electronic_logo:
    title: "Эл лого"
    description: "Электронный логотип."
