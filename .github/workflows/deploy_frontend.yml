name: Deploy Frontend

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        default: prod
        type: choice
        options:
          - prod
          - test
      dry_run:
        description: "Build and stage files without uploading"
        required: true
        default: true
        type: boolean
      release_id:
        description: "Optional explicit release id"
        required: false
        default: ""
        type: string
  push:
    branches:
      - dev
    paths:
      - "apps/web/**"
      - "packages/**"
      - "scripts/deploy_frontend.sh"
      - "scripts/deploy_frontend.ps1"
      - "scripts/deploy_frontend.cmd"
      - "scripts/deploy_frontend_test.cmd"
      - "scripts/deploy_frontend_prod.cmd"
      - "scripts/deploy.yaml"
      - "scripts/deploy.prod.yaml"
      - ".github/workflows/deploy_frontend.yml"

concurrency:
  group: deploy-frontend-${{ github.ref_name }}-${{ github.event_name == 'workflow_dispatch' && inputs.target || 'test' }}
  cancel-in-progress: true

env:
  YC_BUCKET_NAME: dtm-front

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && 'test' || inputs.target }}
    env:
      YC_SA_JSON_CREDENTIALS: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Resolve deploy target
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "push" ]; then
            TARGET="test"
            DRY_RUN="false"
          else
            TARGET="${{ inputs.target }}"
            DRY_RUN="${{ inputs.dry_run }}"
          fi

          case "$TARGET" in
            test)
              TARGET_PREFIX="test-front"
              CONFIG_PATH="apps/web/config/public.yaml"
              ;;
            prod)
              TARGET_PREFIX=""
              CONFIG_PATH="apps/web/config/public.prod.yaml"
              ;;
            *)
              echo "Unsupported target: $TARGET" >&2
              exit 1
              ;;
          esac

          DATE_PART="$(date -u +%Y%m%d-%H%M%S)"
          SHA_PART="$(echo "${GITHUB_SHA}" | cut -c1-7)"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.release_id }}" ]; then
            RELEASE_ID="${{ inputs.release_id }}"
          else
            RELEASE_ID="${TARGET}-${DATE_PART}-${SHA_PART}"
          fi

          SITE_PATH="/"
          if [ -n "$TARGET_PREFIX" ]; then
            SITE_PATH="/$TARGET_PREFIX/"
          fi

          echo "target=$TARGET" >> "$GITHUB_OUTPUT"
          echo "target_prefix=$TARGET_PREFIX" >> "$GITHUB_OUTPUT"
          echo "config_path=$CONFIG_PATH" >> "$GITHUB_OUTPUT"
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"
          echo "dry_run=$DRY_RUN" >> "$GITHUB_OUTPUT"
          echo "site_path=$SITE_PATH" >> "$GITHUB_OUTPUT"

      - name: Validate required deploy config
        shell: bash
        run: |
          set -euo pipefail
          test -n "$YC_BUCKET_NAME"
          test -f "${{ steps.vars.outputs.config_path }}"
          test -f "data/snapshot.example.json"
          test -n "$YC_SA_JSON_CREDENTIALS"

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build -w @dtm/web

      - name: Stage deploy package
        id: stage
        shell: bash
        run: |
          set -euo pipefail

          SITE_DIR=".deploy/site"
          RELEASE_DIR=".deploy/release"

          rm -rf .deploy
          mkdir -p "$SITE_DIR" "$SITE_DIR/config" "$SITE_DIR/data" "$RELEASE_DIR"

          cp -R apps/web/dist/. "$SITE_DIR/"
          cp -R apps/web/public/config/. "$SITE_DIR/config/"
          cp "${{ steps.vars.outputs.config_path }}" "$SITE_DIR/config/public.yaml"
          cp "${{ steps.vars.outputs.config_path }}" "$SITE_DIR/config/public.yam"
          cp data/snapshot.example.json "$SITE_DIR/data/snapshot.example.json"

          cat > "$RELEASE_DIR/release.json" <<EOF
          {
            "release_id": "${{ steps.vars.outputs.release_id }}",
            "deploy_target": "${{ steps.vars.outputs.target }}",
            "site_prefix": "${{ steps.vars.outputs.target_prefix }}",
            "generated_at_utc": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "git_ref": "${GITHUB_REF}",
            "git_sha": "${GITHUB_SHA}"
          }
          EOF
          cp "$RELEASE_DIR/release.json" "$RELEASE_DIR/latest.json"

      - name: Dry-run summary
        if: ${{ steps.vars.outputs.dry_run == 'true' }}
        shell: bash
        run: |
          echo "Dry-run: true"
          echo "Target: ${{ steps.vars.outputs.target }}"
          echo "Bucket: $YC_BUCKET_NAME"
          echo "Site path: ${{ steps.vars.outputs.site_path }}"
          echo "Runtime config: ${{ steps.vars.outputs.config_path }}"
          echo "Release ID: ${{ steps.vars.outputs.release_id }}"

      - name: Upload site package
        if: ${{ steps.vars.outputs.dry_run != 'true' }}
        uses: yc-actions/yc-obj-storage-upload@v3
        with:
          root: .deploy/site
          include: "**"
          # Shared bucket safety: never use destructive clear from Actions.
          # Test deploys must touch only `test-front/`, and prod deploys must not wipe
          # unrelated prefixes or release metadata.
          clear: "false"
          bucket: ${{ env.YC_BUCKET_NAME }}
          prefix: ${{ steps.vars.outputs.target_prefix }}
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}

      - name: Upload release metadata
        if: ${{ steps.vars.outputs.dry_run != 'true' }}
        uses: yc-actions/yc-obj-storage-upload@v3
        with:
          root: .deploy/release
          include: "**"
          clear: "false"
          bucket: ${{ env.YC_BUCKET_NAME }}
          prefix: releases/${{ steps.vars.outputs.target }}
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}

      - name: Deploy summary
        if: ${{ steps.vars.outputs.dry_run != 'true' }}
        shell: bash
        run: |
          echo "Deploy complete"
          echo "Target: ${{ steps.vars.outputs.target }}"
          echo "Bucket: $YC_BUCKET_NAME"
          echo "Site path: ${{ steps.vars.outputs.site_path }}"
          echo "Release ID: ${{ steps.vars.outputs.release_id }}"
